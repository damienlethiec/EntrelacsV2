service: entrelacs
image: ghcr.io/damienlethiec/entrelacs

servers:
  web:
    hosts:
      - 212.47.237.151

# Pas de proxy SSL pour l'instant (mode IP seule)
# Décommenter quand un domaine sera configuré :
# proxy:
#   ssl: true
#   host: entrelacs.example.com
#   app_port: 80

registry:
  server: ghcr.io
  username: damienlethiec
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: entrelacs-db
    POSTGRES_USER: entrelacs
    POSTGRES_DB: entrelacs_production
    APP_HOST: 212.47.237.151
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD

volumes:
  - "entrelacs_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

accessories:
  db:
    image: postgres:17-alpine
    host: 212.47.237.151
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: entrelacs
        POSTGRES_DB: entrelacs_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
    files:
      - config/postgres/init.sql:/docker-entrypoint-initdb.d/setup.sql

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
